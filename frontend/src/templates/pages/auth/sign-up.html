<div class="d-flex align-items-center min-vh-100">
    <div class="container login">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <form class="form-signin">
                    <a href="javascript: void(0)" class="d-block text-center mb-4 mt-5">
                        <img class="mb-4" src="/images/logo.png" alt="logo">
                    </a>
                        <h1 class="title text-center mb-3 font-weight-normal">Создайте аккаунт</h1>
                    <div class="form-label-group position-relative mb-3">
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user fa text-secondary" aria-hidden="true"></i></span>
                                <input type="text" class="form-control" name="name" id="name" placeholder="Имя"/>
                            </div>
                        <span id="name-error" class="error invalid-feedback">Заполните имя.</span>
                    </div>
                    <div class="form-label-group position-relative mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user fa text-secondary" aria-hidden="true"></i></span>
                            <input type="text" class="form-control" name="last-name" id="last-name" placeholder="Фамилия"/>
                        </div>
                        <span id="last-name-error" class="error invalid-feedback">Заполните фамилию.</span>
                    </div>
                    <div class="form-label-group position-relative mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope fa text-secondary" aria-hidden="true"></i></span>
                            <input type="email" class="form-control" name="email" id="email" placeholder="Электронная почта"/>
                        </div>
                        <span id="email-error" class="error invalid-feedback">Заполните электронную почту.</span>
                    </div>
                    <div class="form-label-group position-relative mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock fa text-secondary" aria-hidden="true"></i></span>
                            <input type="password" class="form-control" name="password" id="password" placeholder="Пароль"/>
                        </div>
                        <span id="password-error" class="error invalid-feedback">Заполните пароль.</span>
                    </div>
                    <div class="form-label-group position-relative mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock fa text-secondary" aria-hidden="true"></i></span>
                            <input type="password" class="form-control" name="confirm" id="confirm" placeholder="Подтверждение пароля"/>
                        </div>
                        <span id="password-repeat-error" class="error invalid-feedback">Повторите пароль.</span>
                    </div>
                    <button class="btn btn-lg btn-primary w-100" type="submit">Войти</button>
                    <p class="mb-3 text-muted text-center">Уже есть аккаунт? <a href="/login">Войдите в систему</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
