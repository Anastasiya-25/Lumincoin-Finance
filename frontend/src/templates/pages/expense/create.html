<section class="income-create">

    <div class="row">
        <div class="col-12 col-md-6 col-lg-4">
            <form id="create-expense-form">
                <div class="mb-4">
                    <input type="text"
                           id="expense-name"
                           class="form-control border-secondary-subtle py-2"

                <div class="d-flex gap-2">

            </form>
