<section class="operation-create">
  <h1 class="title mb-xxl-5">Редактирование дохода/расхода</h1>

  <div class="row">
    <div class="col-12 col-md-6 col-lg-4">
      <form id="create-income-form">
        <div class="mb-2">
          <input type="text"
                 id="operation-type"
                 class="form-control border-secondary-subtle py-2"
                 placeholder="Доход" style="width: 397px;">
        </div>
        <div class="mb-2">
          <input type="text"
                 id="operation-name"
                 class="form-control border-secondary-subtle py-2"
                 placeholder="Зарплата" style="width: 397px;">
        </div>
        <div class="mb-2">
          <input type="text"
                 id="operation-sum"
                 class="form-control border-secondary-subtle py-2"
                 placeholder="500 $" style="width: 397px;">
        </div>
        <div class="mb-2">
          <input type="text"
                 id="operation-date"
                 class="form-control border-secondary-subtle py-2"
                 placeholder="11.09.2022" style="width: 397px;">
        </div>
        <div class="mb-4">
          <input type="text"
                 id="operation-comment"
                 class="form-control border-secondary-subtle py-2"
                 placeholder="Комментарий..." style="width: 397px;">
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success px-4">Сохранить</button>
          <a href="/operations/view" class="btn btn-danger px-4">Отмена</a>
        </div>
      </form>
    </div>
  </div>
</section>
