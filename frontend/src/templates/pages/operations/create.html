<section class="operation-create">
    <h1 class="title mb-xxl-5">Создание дохода/расхода</h1>

    <div class="row">
        <div class="col-12 col-md-6 col-lg-4">
            <form id="create-income-form">
                <div class="mb-2">
                    <select id="operation-type"
                            class="form-select border-secondary-subtle py-2"
                            style="width: 397px;">
                        <option value="" selected>Тип...</option>
                        <option value="income">доход</option>
                        <option value="expense">расход</option>
                    </select>
                    <div class="invalid-feedback">Выберите тип операции</div>
                </div>
                <div class="mb-2">
                    <select id="operation-category" class="form-select border-secondary-subtle py-2"
                            style="width: 397px;">
                        <option value="" selected>Категория...</option>
                    </select>
                    <div class="invalid-feedback">Выберите категорию</div>
                </div>
                <div class="mb-2">
                    <input type="text"
                           id="operation-sum"
                           class="form-control border-secondary-subtle py-2"
                           placeholder="Сумма в $..." style="width: 397px;">
                    <div class="invalid-feedback">Введите сумму (минимум 1)</div>
                </div>
                <div class="mb-2">
                    <input type="date"
                           id="operation-date"
                           class="form-control border-secondary-subtle py-2"
                           placeholder="Дата..." style="width: 397px;">
                    <div class="invalid-feedback">Укажите дату</div>
                </div>
                <div class="mb-4">
                    <input type="text"
                           id="operation-comment"
                           class="form-control border-secondary-subtle py-2"
                           placeholder="Комментарий..." style="width: 397px;">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">Создать</button>
                    <a href="/operation/view" class="btn btn-danger px-4">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</section>
