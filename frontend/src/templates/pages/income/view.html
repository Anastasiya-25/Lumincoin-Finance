<section class="income-view">
    <h1 class="title mb-xxl-5">Доходы</h1>

    <div class="income-group d-flex gap-3 flex-wrap">
        <div class="card border-secondary-subtle" style="width: 22rem;">
            <div class="card-body p-4">
                <h3 class="h4 mb-4 title-post">Депозиты</h3>
                <div class="d-flex gap-2">
                    <a href="/income/edit?id=" type="button" class="btn btn-primary w-50">Редактировать</a>
                    <a type="button"
                       class="btn btn-danger w-50 text-white"
                       data-bs-toggle="modal"
                       data-bs-target="#deleteModal"
                       data-id="id_income">Удалить</a>
                </div>
            </div>
        </div>
        <div class="card border-secondary-subtle" style="width: 22rem;">
            <div class="card-body p-4">
                <h3 class="h4 mb-4 title-post">Зарплата</h3>
                <div class="d-flex gap-2">
                    <a href="/income/edit?id=" type="button" class="btn btn-primary w-50">Редактировать</a>
                    <a type="button"
                       class="btn btn-danger w-50 text-white"
                       data-bs-toggle="modal"
                       data-bs-target="#deleteModal"
                       data-id="id_income">Удалить</a>
                </div>
            </div>
        </div>
        <div class="card border-secondary-subtle" style="width: 22rem;">
            <div class="card-body p-4">
                <h3 class="h4 mb-4 title-post">Сбережения</h3>
                <div class="d-flex gap-2">
                    <a href="/income/edit?id=" type="button" class="btn btn-primary w-50">Редактировать</a>
                    <a type="button"
                       class="btn btn-danger w-50 text-white"
                       data-bs-toggle="modal"
                       data-bs-target="#deleteModal"
                       data-id="id_income">Удалить</a>
                </div>
            </div>
        </div>
        <div class="card border-secondary-subtle" style="width: 22rem;">
            <div class="card-body p-4">
                <h3 class="h4 mb-4 title-post">Инвестиции</h3>
                <div class="d-flex gap-2">
                    <a href="/income/edit?id=" type="button" class="btn btn-primary w-50">Редактировать</a>
                    <a type="button"
                       class="btn btn-danger w-50 text-white"
                       data-bs-toggle="modal"
                       data-bs-target="#deleteModal"
                       data-id="id_income">Удалить</a>
                </div>
            </div>
        </div>
        <div class="card border-secondary-subtle d-flex align-items-center justify-content-center"
             style="width: 22rem; min-height: 143px;">
            <div class="card-body d-flex align-items-center justify-content-center">
                <a href="/income/create" class="text-decoration-none link-secondary shadow-none">
                    <i class="fa-solid fa-plus" style="font-size: 2rem; color: #ced4da;"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow">
                <div class="modal-body text-center p-5">
                    <h2 class="h4 mb-4" style="color: #052C65;">Вы действительно хотите удалить категорию? Связанные
                        доходы останутся без категории.</h2>

                    <div class="d-flex justify-content-center gap-3">
                        <button type="button" id="confirm-delete" class="btn btn-success px-4">Да, удалить
                        </button>
                        <button type="button" class="btn btn-danger px-4" data-bs-dismiss="modal">Не удалять
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
